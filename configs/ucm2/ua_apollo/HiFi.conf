# UCM2 HiFi use case for Universal Audio Apollo
#
# Apollo x4 DMA channel layout (from RT171 routing tables):
#
# Playback (24 channels):
#   DMA  0: Mon L        DMA  1: Mon R
#   DMA  2: Line 1       DMA  3: Line 2
#   DMA  4: Line 3       DMA  5: Line 4
#   DMA  6: S/PDIF L     DMA  7: S/PDIF R
#   DMA  8: Virtual 1    DMA  9: Virtual 2
#   DMA 10: Virtual 3    DMA 11: Virtual 4
#   DMA 12: Virtual 5    DMA 13: Virtual 6
#   DMA 14: Virtual 7    DMA 15: Virtual 8
#   DMA 16: CUE1 L       DMA 17: CUE1 R
#   DMA 18: CUE2 L       DMA 19: CUE2 R
#   DMA 20: CUE3 L       DMA 21: CUE3 R
#   DMA 22: CUE4 L       DMA 23: CUE4 R
#
# Capture (22 channels):
#   DMA  0: Mic 1        DMA  1: Mic 2
#   DMA  2: Line 3       DMA  3: Line 4
#   DMA  4: S/PDIF L     DMA  5: S/PDIF R
#   DMA  6: Virtual 1    DMA  7: Virtual 2
#   DMA  8: Virtual 3    DMA  9: Virtual 4
#   DMA 10: Virtual 5    DMA 11: Virtual 6
#   DMA 12: Virtual 7    DMA 13: Virtual 8
#   DMA 14: Mon L        DMA 15: Mon R
#   DMA 16: Aux1 L       DMA 17: Aux1 R
#   DMA 18: Aux2 L       DMA 19: Aux2 R
#   DMA 20: Talkback 1   DMA 21: Talkback 2

SectionVerb {
	EnableSequence [
	]
	DisableSequence [
	]

	Value {
		PlaybackPCM "hw:${CardId}"
		CapturePCM "hw:${CardId}"
	}
}

SectionDevice."Speakers" {
	Comment "All 24 playback channels (Mon, Line, S/PDIF, Virtual, CUE)"

	EnableSequence [
	]
	DisableSequence [
	]

	Value {
		PlaybackPriority 200
		PlaybackPCM "hw:${CardId}"
		PlaybackChannels 24
	}
}

SectionDevice."Mic" {
	Comment "All 22 capture channels (Mic, Line, S/PDIF, Virtual, Mon, Aux, TB)"

	EnableSequence [
	]
	DisableSequence [
	]

	Value {
		CapturePriority 200
		CapturePCM "hw:${CardId}"
		CaptureChannels 22
	}
}

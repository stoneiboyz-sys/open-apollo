# WirePlumber — Apollo Solo USB (snd_usb_audio)
# Deploy to: ~/.config/wireplumber/wireplumber.conf.d/50-apollo-solo-usb.conf
#
# Sets friendly names in Plasma / pavucontrol instead of the long ALSA profile
# label (e.g. "Analog Surround 2.1"). Technical node.name strings are unchanged.

monitor.alsa.rules = [
    {
        matches = [
            { node.name = "~alsa_input.*Apollo_Solo_USB*" }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
                node.pause-on-idle = false
                node.nick = "Apollo Solo USB"
                node.description = "Apollo Solo USB (inputs)"
            }
        }
    }
    {
        matches = [
            { node.name = "~alsa_output.*Apollo_Solo_USB*" }
        ]
        actions = {
            update-props = {
                session.suspend-timeout-seconds = 0
                node.pause-on-idle = false
                node.nick = "Apollo Solo USB"
                node.description = "Apollo Solo USB (outputs)"
            }
        }
    }
    {
        matches = [
            { device.name = "~alsa_card.*Apollo_Solo_USB*" }
        ]
        actions = {
            update-props = {
                device.profile = "output:analog-surround-21+input:analog-surround-21"
            }
        }
    }
]

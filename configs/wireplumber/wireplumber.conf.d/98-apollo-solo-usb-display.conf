# WirePlumber SPA-JSON (0.5+): duplicate friendly names for Apollo Solo USB.
# Some installs merge this file; Lua in main.lua.d/52-apollo-solo-usb-names.lua is primary on 0.4.x.
# If both apply, identical props are harmless.

monitor.alsa.rules = [
  {
    matches = [
      { node.name = "~alsa_output\\.usb-.*Apollo_Solo_USB.*" }
    ]
    actions = {
      update-props = {
        node.nick = "Apollo Solo USB"
        node.description = "Apollo Solo USB"
      }
    }
  },
  {
    matches = [
      { node.name = "~alsa_input\\.usb-.*Apollo_Solo_USB.*" }
    ]
    actions = {
      update-props = {
        node.nick = "Apollo Solo USB"
        node.description = "Apollo Solo USB"
      }
    }
  },
  {
    matches = [
      { device.name = "~alsa_card\\.usb-.*Apollo_Solo_USB.*" }
    ]
    actions = {
      update-props = {
        device.nick = "Apollo Solo USB"
        device.description = "Apollo Solo USB"
      }
    }
  }
]

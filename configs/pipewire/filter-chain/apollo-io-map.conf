# PipeWire filter-chain config for Apollo x4 I/O mapping
# Creates individual stereo/mono virtual devices from the 24ch/22ch pro-audio streams
#
# Deploy to: ~/.config/pipewire/filter-chain/apollo-io-map.conf
# Or system-wide: /etc/pipewire/filter-chain.conf.d/apollo-io-map.conf
#
# This runs as a PipeWire module that creates named virtual sinks and sources
# mapped to specific channels of the Apollo's pro-audio PCM device.

context.modules = [
    # ── Capture (Input) Virtual Sources ──
    # Each maps specific Apollo capture AUX channels to a stereo/mono PipeWire source

    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Mic 1"
            capture.props = {
                node.name   = "apollo_mic_1"
                media.class = "Audio/Source"
                audio.position = [ FL ]
            }
            playback.props = {
                node.name   = "apollo_mic_1_play"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX0 ]

                stream.dont-remix = true
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Mic 2"
            capture.props = {
                node.name   = "apollo_mic_2"
                media.class = "Audio/Source"
                audio.position = [ FL ]
            }
            playback.props = {
                node.name   = "apollo_mic_2_play"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX1 ]

                stream.dont-remix = true
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Mic 1+2 Stereo"
            capture.props = {
                node.name   = "apollo_mic_stereo"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "apollo_mic_stereo_play"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX0 AUX1 ]

                stream.dont-remix = true
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Line 3+4"
            capture.props = {
                node.name   = "apollo_line_34"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "apollo_line_34_play"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX2 AUX3 ]

                stream.dont-remix = true
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo S/PDIF"
            capture.props = {
                node.name   = "apollo_spdif_in"
                media.class = "Audio/Source"
                audio.position = [ FL FR ]
            }
            playback.props = {
                node.name   = "apollo_spdif_in_play"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX4 AUX5 ]

                stream.dont-remix = true
            }
        }
    }

    # ── Playback (Output) Virtual Sinks ──

    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Monitor"
            capture.props = {
                node.name   = "apollo_monitor_cap"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX0 AUX1 ]
                stream.dont-remix = true
            }
            playback.props = {
                node.name   = "apollo_monitor"
                media.class = "Audio/Sink"
                audio.position = [ FL FR ]
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Virtual 1+2 (DAW)"
            capture.props = {
                node.name   = "apollo_virtual_12_cap"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX8 AUX9 ]
                stream.dont-remix = true
            }
            playback.props = {
                node.name   = "apollo_virtual_12"
                media.class = "Audio/Sink"
                audio.position = [ FL FR ]
            }
        }
    }
    { name = libpipewire-module-loopback
        args = {
            node.description = "Apollo Headphone"
            capture.props = {
                node.name   = "apollo_headphone_cap"
                node.target = "Apollo x4 Pro"
                audio.position = [ AUX16 AUX17 ]
                stream.dont-remix = true
            }
            playback.props = {
                node.name   = "apollo_headphone"
                media.class = "Audio/Sink"
                audio.position = [ FL FR ]
            }
        }
    }
]

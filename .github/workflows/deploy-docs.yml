name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'

jobs:
  trigger-docs-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger docs site rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DOCS_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/rolotrealanis98/open-apollo-docs/dispatches \
            -d '{"event_type":"docs-updated"}'
